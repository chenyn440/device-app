<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Device App Web Console</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <main class="container">
    <h1>Device App Web Console</h1>
    <p class="hint">网关地址：<code id="origin"></code></p>

    <section class="panel">
      <h2>连接</h2>
      <div class="row">
        <label>Host <input id="host" value="127.0.0.1" /></label>
        <label>Port <input id="port" type="number" value="9000" /></label>
      </div>
      <div class="row">
        <button id="connectBtn">连接设备</button>
        <button id="disconnectBtn">断开设备</button>
      </div>
    </section>

    <section class="panel">
      <h2>扫描</h2>
      <div class="row">
        <label>Mass Start <input id="massStart" type="number" step="0.1" value="1" /></label>
        <label>Mass End <input id="massEnd" type="number" step="0.1" value="200" /></label>
      </div>
      <div class="row">
        <button id="startScanBtn">开始扫描</button>
        <button id="stopScanBtn">停止扫描</button>
        <button id="saveFrameBtn">保存当前帧</button>
      </div>
    </section>

    <section class="panel">
      <h2>调谐</h2>
      <div class="row">
        <label>Repeller <input id="repeller" type="number" step="0.1" value="12" /></label>
        <label>Lens1 <input id="lens1" type="number" step="0.1" value="6" /></label>
        <label>Lens2 <input id="lens2" type="number" step="0.1" value="10" /></label>
      </div>
      <div class="row">
        <button id="applyTuneBtn">应用调谐参数</button>
      </div>
    </section>

    <section class="panel">
      <h2>实时状态</h2>
      <pre id="statusView">等待状态...</pre>
      <pre id="frameView">等待谱图帧...</pre>
    </section>

    <section class="panel">
      <h2>日志</h2>
      <pre id="logView"></pre>
    </section>
  </main>

  <script src="/app.js"></script>
</body>
</html>
